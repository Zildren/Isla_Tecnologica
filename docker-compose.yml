services:
  db:
    image: postgres:15
    container_name: isla_db_container
    restart: always
    environment:
      POSTGRES_DB: isla_tecnologica_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root  # Pon la misma que en application.properties
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: